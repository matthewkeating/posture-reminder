name: PostureReminder
options:
  bundleIdPrefix: com.mattkeating
  createIntermediateGroups: true

targets:
  PostureReminder:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/PostureReminder
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.mattkeating.posture-reminder
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/PostureReminder/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_HARDENED_RUNTIME: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
